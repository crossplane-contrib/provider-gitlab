apiVersion: v1
kind: Secret
metadata:
  name: local-repositoryfile-secret-content
  namespace: default
type: Opaque
stringData:
  content: |
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: generated-config
    data:
      mode: secret-backed
      source: crossplane-provider-gitlab
      note: this file content came from a kubernetes secret
---
apiVersion: projects.gitlab.m.crossplane.io/v1alpha1
kind: RepositoryFile
metadata:
  name: local-repositoryfile-secret-backed
  namespace: default
spec:
  forProvider:
    projectId: "1"
    filePath: generated/secret-backed-config.yaml
    branch: main
    reconcileInterval: 2h
    createCommitMessage: "feat: add secret-backed config file"
    updateCommitMessage: "chore: refresh secret-backed config file"
    deleteCommitMessage: "chore: remove secret-backed config file"
    contentSecretRef:
      name: local-repositoryfile-secret-content
      key: content
  providerConfigRef:
    name: gitlab-provider
    kind: ProviderConfig
