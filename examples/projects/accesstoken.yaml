apiVersion: projects.gitlab.m.crossplane.io/v1alpha1
kind: AccessToken
metadata:
  name: example-access-token
  namespace: default
spec:
  forProvider:
    name: example-access-token
    projectIdRef:
      name: example-project
    accessLevel: 40
    expiresAt: "2026-06-15T08:00:00Z"
    scopes:
      - "read_repository"
  providerConfigRef:
    name: gitlab-provider
    kind: ProviderConfig
  writeConnectionSecretToRef:
    name: gitlab-example-access-token
---
apiVersion: projects.gitlab.m.crossplane.io/v1alpha1
kind: AccessToken
metadata:
  name: example-access-token-no-expiry
  namespace: default
spec:
  forProvider:
    name: example-access-token-no-expiry
    projectIdRef:
      name: example-project
    accessLevel: 40
    renewalPeriodDays: 5 # Configure auto renewal every 5 days
    scopes:
      - "read_repository"
  providerConfigRef:
    name: gitlab-provider
    kind: ProviderConfig
  writeConnectionSecretToRef:
    name: gitlab-example-access-token-no-expiry

---
# Self-managed / self-rotating project access token.
#
# The token's value is consumed by the very ProviderConfig used to reconcile it,
# so the provider authenticates AS the token's bot user and can only use the self
# endpoints (self-inform + self-rotate + self-revoke). The controller detects
# this automatically when the referenced ProviderConfig's credentials secretRef
# matches this resource's writeConnectionSecretToRef (same namespace, name, and
# key "token") and the method is PersonalAccessToken. A SelfManaged status
# condition reports the active mode.
#
# Bootstrap (one-time): the token must already exist and be reachable via the
# secret below. Either bootstrap once in owner-mode (point providerConfigRef at a
# project-owner ProviderConfig so Crossplane creates and OWNS the connection
# secret, then switch to the self ProviderConfig), or hand-create the secret with
# type connection.crossplane.io/v1alpha1 (NOT Opaque) and a `token` key holding a
# project access token with at least the `api` and `self_rotate` scopes.
#
# Identity guard: in self mode the provider adopts whatever token the credential
# authenticates as, so spec.forProvider.name MUST match the adopted token's name
# (the self-inform response does not expose the project binding).
---
# Hand-created bootstrap secret. Note the connection secret type.
apiVersion: v1
kind: Secret
metadata:
  name: gitlab-self-rotating-project-token
  namespace: default
type: connection.crossplane.io/v1alpha1
stringData:
  token: <a project access token with api + self_rotate scopes>
---
apiVersion: gitlab.m.crossplane.io/v1beta1
kind: ProviderConfig
metadata:
  name: gitlab-self-rotating-project
  namespace: default
spec:
  baseURL: https://gitlab.example.com/
  credentials:
    source: Secret
    method: PersonalAccessToken
    secretRef:
      namespace: default
      # Same secret the AccessToken below writes its token into.
      name: gitlab-self-rotating-project-token
      key: token
---
apiVersion: projects.gitlab.m.crossplane.io/v1alpha1
kind: AccessToken
metadata:
  name: self-rotating-project-access-token
  namespace: default
spec:
  forProvider:
    # name must match the adopted token; include self_rotate so the provider can
    # rotate it, plus api to reconcile resources.
    name: crossplane-self-rotating-project
    scopes:
      - api
      - self_rotate
    # Short lifetime; the provider rotates well before expiry.
    renewalPeriodDays: 7
    renewBeforeDays: 2
  # Uses the ProviderConfig that authenticates with this very token.
  providerConfigRef:
    name: gitlab-self-rotating-project
    kind: ProviderConfig
  # Writes the rotated token back into the ProviderConfig's credentials secret,
  # closing the self-rotation loop.
  writeConnectionSecretToRef:
    name: gitlab-self-rotating-project-token
