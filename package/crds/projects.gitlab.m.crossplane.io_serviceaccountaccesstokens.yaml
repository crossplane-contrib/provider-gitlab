    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          A ServiceAccountAccessToken is a managed resource that represents a GitLab project
          service account personal access token.
          This is only available with at least a Premium license.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: A ServiceAccountAccessTokenSpec defines the desired state
              of a GitLab service account access token.
            properties:
              forProvider:
                description: |-
                  ServiceAccountAccessTokenParameters define the desired state of a GitLab project
                  service account personal access token.
                  https://docs.gitlab.com/api/service_accounts/
                properties:
                  description:
                    description: |-
                      Description of the service account access token
                      WARNING: this field is only reconciled on expiration / revokation of the token
                    type: string
                  expiresAt:
                    description: |-
                      ExpiresAt is the expiration date of the access token in ISO 8601 format (2019-03-15T08:00:00Z).
                      The date cannot be set later than the maximum allowable lifetime of an access token.
                      Since GitLab 16.0, tokens must have an expiration date.
                      Mutually exclusive with RenewalPeriodDays.
                    format: date-time
                    type: string
                  name:
                    description: Name of the service account access token
                    type: string
                    x-kubernetes-validations:
                    - message: name is immutable
                      rule: self == oldSelf
                  projectId:
                    description: ProjectID is the ID of the project that owns the
                      service account.
                    format: int64
                    type: integer
                    x-kubernetes-validations:
                    - message: projectId is immutable
                      rule: self == oldSelf
                  projectIdRef:
                    description: ProjectIDRef is a reference to a project to retrieve
                      its projectId.
                    properties:
                      name:
                        description: Name of the referenced object.
                        type: string
                      namespace:
                        description: Namespace of the referenced object
                        type: string
                      policy:
                        description: Policies for referencing.
                        properties:
                          resolution:
                            default: Required
                            description: |-
                              Resolution specifies whether resolution of this reference is required.
                              The default is 'Required', which means the reconcile will fail if the
                              reference cannot be resolved. 'Optional' means this reference will be
                              a no-op if it cannot be resolved.
                            enum:
                            - Required
                            - Optional
                            type: string
                          resolve:
                            description: |-
                              Resolve specifies when this reference should be resolved. The default
                              is 'IfNotPresent', which will attempt to resolve the reference only when
                              the corresponding field is not present. Use 'Always' to resolve the
                              reference on every reconcile.
                            enum:
                            - Always
                            - IfNotPresent
                            type: string
                        type: object
                    required:
                    - name
                    type: object
                  projectIdSelector:
                    description: ProjectIDSelector selects reference to a project
                      to retrieve its projectId.
                    properties:
                      matchControllerRef:
                        description: |-
                          MatchControllerRef ensures an object with the same controller reference
                          as the selecting object is selected.
                        type: boolean
                      matchLabels:
                        additionalProperties:
                          type: string
                        description: MatchLabels ensures an object with matching labels
                          is selected.
                        type: object
                      namespace:
                        description: Namespace for the selector
                        type: string
                      policy:
                        description: Policies for selection.
                        properties:
                          resolution:
                            default: Required
                            description: |-
                              Resolution specifies whether resolution of this reference is required.
                              The default is 'Required', which means the reconcile will fail if the
                              reference cannot be resolved. 'Optional' means this reference will be
                              a no-op if it cannot be resolved.
                            enum:
                            - Required
                            - Optional
                            type: string
                          resolve:
                            description: |-
                              Resolve specifies when this reference should be resolved. The default
                              is 'IfNotPresent', which will attempt to resolve the reference only when
                              the corresponding field is not present. Use 'Always' to resolve the
                              reference on every reconcile.
                            enum:
                            - Always
                            - IfNotPresent
                            type: string
                        type: object
                    type: object
                  renewBeforeDays:
                    description: |-
                      RenewBeforeDays overrides the default 2/3-lifetime renewal threshold.
                      When set, the provider rotates the token when fewer than RenewBeforeDays
                      remain before expiry. Only valid with RenewalPeriodDays.
                      Must be less than RenewalPeriodDays.
                    minimum: 1
                    type: integer
                  renewalPeriodDays:
                    description: |-
                      RenewalPeriodDays is the number of days each token generation should live.
                      The provider rotates it shortly before expiry, or once inactive, setting the new
                      expiry to RenewalPeriodDays days from the rotation time.
                      Mutually exclusive with ExpiresAt.
                    minimum: 1
                    type: integer
                  scopes:
                    description: |-
                      Scopes indicates the access token scopes.
                      Must be at least one of api, read_api, read_repository, write_repository,
                      read_registry, write_registry, read_package_registry, write_package_registry,
                      or self_rotate.
                    items:
                      type: string
                    type: array
                    x-kubernetes-validations:
                    - message: scopes is immutable
                      rule: self == oldSelf
                  serviceAccountId:
                    description: |-
                      ServiceAccountID is the ID of the service account user the personal
                      access token belongs to.
                    format: int64
                    type: integer
                    x-kubernetes-validations:
                    - message: serviceAccountId is immutable
                      rule: self == oldSelf
                  serviceAccountIdRef:
                    description: ServiceAccountIDRef is a reference to a ServiceAccount
                      to retrieve its serviceAccountId.
                    properties:
                      name:
                        description: Name of the referenced object.
                        type: string
                      namespace:
                        description: Namespace of the referenced object
                        type: string
                      policy:
                        description: Policies for referencing.
                        properties:
                          resolution:
                            default: Required
                            description: |-
                              Resolution specifies whether resolution of this reference is required.
                              The default is 'Required', which means the reconcile will fail if the
                              reference cannot be resolved. 'Optional' means this reference will be
                              a no-op if it cannot be resolved.
                            enum:
                            - Required
                            - Optional
                            type: string
                          resolve:
                            description: |-
                              Resolve specifies when this reference should be resolved. The default
                              is 'IfNotPresent', which will attempt to resolve the reference only when
                              the corresponding field is not present. Use 'Always' to resolve the
                              reference on every reconcile.
                            enum:
                            - Always
                            - IfNotPresent
                            type: string
                        type: object
                    required:
                    - name
                    type: object
                  serviceAccountIdSelector:
                    description: ServiceAccountIDSelector selects a reference to a
                      ServiceAccount to retrieve its serviceAccountId.
                    properties:
                      matchControllerRef:
                        description: |-
                          MatchControllerRef ensures an object with the same controller reference
                          as the selecting object is selected.
                        type: boolean
                      matchLabels:
                        additionalProperties:
                          type: string
                        description: MatchLabels ensures an object with matching labels
                          is selected.
                        type: object
                      namespace:
                        description: Namespace for the selector
                        type: string
                      policy:
                        description: Policies for selection.
                        properties:
                          resolution:
                            default: Required
                            description: |-
                              Resolution specifies whether resolution of this reference is required.
                              The default is 'Required', which means the reconcile will fail if the
                              reference cannot be resolved. 'Optional' means this reference will be
                              a no-op if it cannot be resolved.
                            enum:
                            - Required
                            - Optional
                            type: string
                          resolve:
                            description: |-
                              Resolve specifies when this reference should be resolved. The default
                              is 'IfNotPresent', which will attempt to resolve the reference only when
                              the corresponding field is not present. Use 'Always' to resolve the
                              reference on every reconcile.
                            enum:
                            - Always
                            - IfNotPresent
                            type: string
                        type: object
                    type: object
                required:
                - name
                - scopes
                type: object
                x-kubernetes-validations:
                - message: exactly one of expiresAt or renewalPeriodDays must be set
                  rule: '(has(self.expiresAt) ? 1 : 0) + (has(self.renewalPeriodDays)
                    ? 1 : 0) == 1'
                - message: renewBeforeDays requires renewalPeriodDays
                  rule: '!has(self.renewBeforeDays) || has(self.renewalPeriodDays)'
                - message: renewalPeriodDays must be greater than renewBeforeDays
                  rule: '!has(self.renewBeforeDays) || !has(self.renewalPeriodDays)
                    || self.renewalPeriodDays > self.renewBeforeDays'
              managementPolicies:
                default:
                - '*'
                description: |-
                  THIS IS A BETA FIELD. It is on by default but can be opted out
                  through a Crossplane feature flag.
                  ManagementPolicies specify the array of actions Crossplane is allowed to
                  take on the managed and external resources.
                  See the design doc for more information: https://github.com/crossplane/crossplane/blob/499895a25d1a1a0ba1604944ef98ac7a1a71f197/design/design-doc-observe-only-resources.md?plain=1#L223
                  and this one: https://github.com/crossplane/crossplane/blob/444267e84783136daa93568b364a5f01228cacbe/design/one-pager-ignore-changes.md
                items:
                  description: |-
                    A ManagementAction represents an action that the Crossplane controllers
                    can take on an external resource.
                  enum:
