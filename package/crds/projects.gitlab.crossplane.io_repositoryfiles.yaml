---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: repositoryfiles.projects.gitlab.crossplane.io
spec:
  group: projects.gitlab.crossplane.io
  names:
    categories:
    - crossplane
    - managed
    - gitlab
    kind: RepositoryFile
    listKind: RepositoryFileList
    plural: repositoryfiles
    singular: repositoryfile
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.forProvider.filePath
      name: FILE
      type: string
    - jsonPath: .spec.forProvider.branch
      name: BRANCH
      type: string
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: READY
      type: string
    - jsonPath: .status.conditions[?(@.type=='Synced')].status
      name: SYNCED
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: AGE
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: A RepositoryFile is a managed resource that represents a file
          in a GitLab repository.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: A RepositoryFileSpec defines the desired state of a GitLab
              Repository File.
            properties:
              deletionPolicy:
                default: Delete
                description: |-
                  DeletionPolicy specifies what will happen to the underlying external
                  when this managed resource is deleted - either "Delete" or "Orphan" the
                  external resource.
                  This field is planned to be deprecated in favor of the ManagementPolicies
                  field in a future release. Currently, both could be set independently and
                  non-default values would be honored if the feature flag is enabled.
                  See the design doc for more information: https://github.com/crossplane/crossplane/blob/499895a25d1a1a0ba1604944ef98ac7a1a71f197/design/design-doc-observe-only-resources.md?plain=1#L223
                enum:
                - Orphan
                - Delete
                type: string
              forProvider:
                description: ForProvider specifies the desired state of the RepositoryFile.
                properties:
                  authorEmail:
                    description: AuthorEmail is the commit author email.
                    type: string
                  authorName:
                    description: AuthorName is the commit author name.
                    type: string
                  branch:
                    description: Branch is the name of the branch to commit to.
                    minLength: 1
                    type: string
                  content:
                    description: Content is the file content. Mutually exclusive with
                      ContentSecretRef.
                    type: string
                  contentSecretRef:
                    description: |-
                      ContentSecretRef references a Secret key containing the file content.
                      Mutually exclusive with Content.
                    nullable: true
                    properties:
                      key:
                        description: The key to select.
                        type: string
                      name:
                        description: Name of the secret.
                        type: string
                      namespace:
                        description: Namespace of the secret.
                        type: string
                    required:
                    - key
                    - name
                    - namespace
                    type: object
                  createCommitMessage:
                    description: |-
                      CreateCommitMessage is the commit message used when creating the file.
                      Defaults to "crossplane: create <filePath>".
                    type: string
                  createOnly:
                    default: false
                    description: |-
                      CreateOnly when true, creates the file once and never updates it.
                      The file is still deleted from GitLab when the CR is deleted.
                      Observe only checks for file existence, not content drift.
                    type: boolean
                  deleteCommitMessage:
                    description: |-
                      DeleteCommitMessage is the commit message used when deleting the file.
                      Defaults to "crossplane: delete <filePath>".
                    type: string
                  encoding:
                    default: text
                    description: 'Encoding is the file encoding: "text" (default)
                      or "base64".'
                    enum:
                    - text
                    - base64
                    type: string
                  executeFilemode:
                    description: ExecuteFilemode enables the executable flag on the
                      file.
                    type: boolean
                  filePath:
                    description: FilePath is the path of the file in the repository.
                    minLength: 1
                    type: string
                  projectId:
                    description: The ID or URL-encoded path of the project owned by
                      the authenticated user.
                    type: string
                  projectIdRef:
                    description: ProjectIDRef is a reference to a project to retrieve
                      its projectId.
                    properties:
                      name:
                        description: Name of the referenced object.
                        type: string
                      policy:
                        description: Policies for referencing.
                        properties:
                          resolution:
                            default: Required
                            description: |-
                              Resolution specifies whether resolution of this reference is required.
                              The default is 'Required', which means the reconcile will fail if the
                              reference cannot be resolved. 'Optional' means this reference will be
                              a no-op if it cannot be resolved.
                            enum:
                            - Required
                            - Optional
                            type: string
                          resolve:
                            description: |-
                              Resolve specifies when this reference should be resolved. The default
                              is 'IfNotPresent', which will attempt to resolve the reference only when
                              the corresponding field is not present. Use 'Always' to resolve the
                              reference on every reconcile.
                            enum:
                            - Always
                            - IfNotPresent
                            type: string
                        type: object
                    required:
                    - name
                    type: object
                  projectIdSelector:
                    description: ProjectIDSelector selects reference to a project
                      to retrieve its projectId.
                    properties:
                      matchControllerRef:
                        description: |-
                          MatchControllerRef ensures an object with the same controller reference
                          as the selecting object is selected.
                        type: boolean
                      matchLabels:
                        additionalProperties:
                          type: string
                        description: MatchLabels ensures an object with matching labels
                          is selected.
                        type: object
                      policy:
                        description: Policies for selection.
                        properties:
                          resolution:
                            default: Required
                            description: |-
                              Resolution specifies whether resolution of this reference is required.
                              The default is 'Required', which means the reconcile will fail if the
                              reference cannot be resolved. 'Optional' means this reference will be
                              a no-op if it cannot be resolved.
                            enum:
                            - Required
                            - Optional
                            type: string
                          resolve:
                            description: |-
                              Resolve specifies when this reference should be resolved. The default
                              is 'IfNotPresent', which will attempt to resolve the reference only when
                              the corresponding field is not present. Use 'Always' to resolve the
                              reference on every reconcile.
                            enum:
                            - Always
                            - IfNotPresent
                            type: string
                        type: object
                    type: object
                  reconcileInterval:
                    description: |-
                      ReconcileInterval controls how often this resource is reconciled against
                      the GitLab API. Examples: "5m", "1h", "8h". If unset, the resource is
                      reconciled at the controller's default poll interval.
                    pattern: ^([0-9]+(ns|us|µs|ms|s|m|h))+$
                    type: string
                  startBranch:
                    description: StartBranch is the source branch used to create branch
                      if Branch does not exist yet.
                    type: string
                  updateCommitMessage:
                    description: |-
                      UpdateCommitMessage is the commit message used when updating the file.
                      Defaults to "crossplane: update <filePath>".
                    type: string
                required:
                - branch
                - filePath
                type: object
              managementPolicies:
                default:
                - '*'
                description: |-
                  THIS IS A BETA FIELD. It is on by default but can be opted out
                  through a Crossplane feature flag.
                  ManagementPolicies specify the array of actions Crossplane is allowed to
                  take on the managed and external resources.
                  This field is planned to replace the DeletionPolicy field in a future
                  release. Currently, both could be set independently and non-default
                  values would be honored if the feature flag is enabled. If both are
                  custom, the DeletionPolicy field will be ignored.
                  See the design doc for more information: https://github.com/crossplane/crossplane/blob/499895a25d1a1a0ba1604944ef98ac7a1a71f197/design/design-doc-observe-only-resources.md?plain=1#L223
                  and this one: https://github.com/crossplane/crossplane/blob/444267e84783136daa93568b364a5f01228cacbe/design/one-pager-ignore-changes.md
                items:
                  description: |-
                    A ManagementAction represents an action that the Crossplane controllers
                    can take on an external resource.
                  enum:
                  - Observe
                  - Create
                  - Update
                  - Delete
                  - LateInitialize
                  - '*'
                  type: string
                type: array
              providerConfigRef:
                default:
                  name: default
                description: |-
                  ProviderConfigReference specifies how the provider that will be used to
                  create, observe, update, and delete this managed resource should be
                  configured.
                properties:
                  name:
                    description: Name of the referenced object.
                    type: string
                  policy:
                    description: Policies for referencing.
                    properties:
                      resolution:
                        default: Required
                        description: |-
                          Resolution specifies whether resolution of this reference is required.
                          The default is 'Required', which means the reconcile will fail if the
                          reference cannot be resolved. 'Optional' means this reference will be
                          a no-op if it cannot be resolved.
                        enum:
                        - Required
                        - Optional
                        type: string
                      resolve:
                        description: |-
                          Resolve specifies when this reference should be resolved. The default
                          is 'IfNotPresent', which will attempt to resolve the reference only when
                          the corresponding field is not present. Use 'Always' to resolve the
                          reference on every reconcile.
                        enum:
                        - Always
                        - IfNotPresent
                        type: string
                    type: object
                required:
                - name
                type: object
              writeConnectionSecretToRef:
                description: |-
                  WriteConnectionSecretToReference specifies the namespace and name of a
                  Secret to which any connection details for this managed resource should
                  be written. Connection details frequently include the endpoint, username,
                  and password required to connect to the managed resource.
                properties:
                  name:
                    description: Name of the secret.
                    type: string
                  namespace:
                    description: Namespace of the secret.
                    type: string
                required:
                - name
                - namespace
                type: object
            required:
            - forProvider
            type: object
          status:
            description: A RepositoryFileStatus represents the observed state of a
              GitLab Repository File.
            properties:
              atProvider:
                description: AtProvider reflects the observed state from GitLab.
                properties:
                  blobId:
                    description: BlobID is the blob SHA of the file.
                    type: string
                  commitId:
                    description: CommitID is the commit SHA when the file was last
                      read.
                    type: string
                  filePath:
                    description: FilePath is the observed file path.
                    type: string
                  lastCommitId:
                    description: LastCommitID is the last commit SHA that modified
                      this file.
                    type: string
                  sha256:
                    description: SHA256 is the SHA-256 hash of the file content.
                    type: string
                  size:
                    description: Size is the file size in bytes.
                    format: int64
                    type: integer
                type: object
              conditions:
                description: Conditions of the resource.
                items:
                  description: A Condition that may apply to a resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        LastTransitionTime is the last time this condition transitioned from one
                        status to another.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        A Message containing details about this condition's last transition from
                        one status to another, if any.
                      type: string
                    observedGeneration:
                      description: |-
                        ObservedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      type: integer
                    reason:
                      description: A Reason for this condition's last transition from
                        one status to another.
                      type: string
                    status:
                      description: Status of this condition; is it currently True,
                        False, or Unknown?
                      type: string
                    type:
                      description: |-
                        Type of this condition. At most one of each condition type may apply to
                        a resource at any point in time.
                      type: string
                  required:
                  - lastTransitionTime
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: |-
                  ObservedGeneration is the latest metadata.generation
                  which resulted in either a ready state, or stalled due to error
                  it can not recover from without human intervention.
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
        x-kubernetes-validations:
        - message: exactly one of spec.forProvider.content or spec.forProvider.contentSecretRef
            must be set
          rule: has(self.spec.forProvider.content) != has(self.spec.forProvider.contentSecretRef)
        - message: createOnly=true cannot be combined with managementPolicies=['*']
          rule: '!has(self.spec.forProvider.createOnly) || !self.spec.forProvider.createOnly
            || !has(self.spec.managementPolicies) || size(self.spec.managementPolicies)
            != 1 || self.spec.managementPolicies[0] != ''*'''
    served: true
    storage: true
    subresources:
      status: {}
