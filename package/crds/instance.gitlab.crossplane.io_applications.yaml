---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: applications.instance.gitlab.crossplane.io
spec:
  group: instance.gitlab.crossplane.io
  names:
    categories:
    - crossplane
    - managed
    - gitlab
    kind: Application
    listKind: ApplicationList
    plural: applications
    singular: application
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: READY
      type: string
    - jsonPath: .status.conditions[?(@.type=='Synced')].status
      name: SYNCED
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: AGE
      type: date
    - jsonPath: .status.atProvider.nextRenewalAt
      name: NEXT-RENEWAL
      priority: 1
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          An Application is a managed resource that represents a GitLab instance OAuth Application.

          IMPORTANT: The OAuth client secret is only available at creation time. You MUST specify
          writeConnectionSecretToRef to receive the secret.
          The connection details will contain:
            - "secret": the OAuth client secret
            - "application_id": the OAuth client application ID

          GitLab API docs: https://docs.gitlab.com/api/applications/
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ApplicationSpec defines the desired state of a GitLab instance
              OAuth Application.
            properties:
              deletionPolicy:
                default: Delete
                description: |-
                  DeletionPolicy specifies what will happen to the underlying external
                  when this managed resource is deleted - either "Delete" or "Orphan" the
                  external resource.
                  This field is planned to be deprecated in favor of the ManagementPolicies
                  field in a future release. Currently, both could be set independently and
                  non-default values would be honored if the feature flag is enabled.
                  See the design doc for more information: https://github.com/crossplane/crossplane/blob/499895a25d1a1a0ba1604944ef98ac7a1a71f197/design/design-doc-observe-only-resources.md?plain=1#L223
                enum:
                - Orphan
                - Delete
                type: string
              forProvider:
                description: |-
                  ApplicationParameters defines the desired state of a GitLab instance OAuth Application.
                  Note: GitLab does not provide an update endpoint for applications. If any field is changed,
                  the application must be deleted and recreated.

                  GitLab API docs: https://docs.gitlab.com/api/applications/
                properties:
                  confidential:
                    description: Confidential indicates whether the application is
                      confidential.
                    type: boolean
                    x-kubernetes-validations:
                    - message: Confidential is immutable (delete and recreate the
                        resource if you want to change it).
                      rule: self == oldSelf
                  name:
                    description: Name is the name of the application.
                    type: string
                    x-kubernetes-validations:
                    - message: Name is immutable (delete and recreate the resource
                        if you want to change it).
                      rule: self == oldSelf
                  redirectURI:
                    description: RedirectURI is the redirect URI of the application.
                    type: string
                    x-kubernetes-validations:
                    - message: RedirectURI is immutable (delete and recreate the resource
                        if you want to change it).
                      rule: self == oldSelf
                  renewalPeriodDays:
                    description: |-
                      RenewalPeriodDays specifies how often (in days) the OAuth client secret should
                      be rotated. When set, the controller records the next renewal date in an annotation
                      and triggers a secret renewal via the GitLab API when that date is reached.
                      The renewed secret is written back to the connection secret.
                    format: int64
                    minimum: 1
                    type: integer
                  scopes:
                    description: Scopes is the scopes of the application (space-separated).
                    items:
                      type: string
                    type: array
                    x-kubernetes-validations:
                    - message: Scopes is immutable (delete and recreate the resource
                        if you want to change it).
                      rule: self == oldSelf
                required:
                - name
                - redirectURI
                - scopes
                type: object
              managementPolicies:
                default:
                - '*'
                description: |-
                  THIS IS A BETA FIELD. It is on by default but can be opted out
                  through a Crossplane feature flag.
                  ManagementPolicies specify the array of actions Crossplane is allowed to
                  take on the managed and external resources.
                  This field is planned to replace the DeletionPolicy field in a future
                  release. Currently, both could be set independently and non-default
                  values would be honored if the feature flag is enabled. If both are
                  custom, the DeletionPolicy field will be ignored.
                  See the design doc for more information: https://github.com/crossplane/crossplane/blob/499895a25d1a1a0ba1604944ef98ac7a1a71f197/design/design-doc-observe-only-resources.md?plain=1#L223
                  and this one: https://github.com/crossplane/crossplane/blob/444267e84783136daa93568b364a5f01228cacbe/design/one-pager-ignore-changes.md
                items:
                  description: |-
                    A ManagementAction represents an action that the Crossplane controllers
                    can take on an external resource.
                  enum:
                  - Observe
                  - Create
                  - Update
                  - Delete
                  - LateInitialize
                  - '*'
                  type: string
                type: array
              providerConfigRef:
                default:
                  name: default
                description: |-
                  ProviderConfigReference specifies how the provider that will be used to
                  create, observe, update, and delete this managed resource should be
                  configured.
                properties:
                  name:
                    description: Name of the referenced object.
                    type: string
                  policy:
                    description: Policies for referencing.
                    properties:
                      resolution:
                        default: Required
                        description: |-
                          Resolution specifies whether resolution of this reference is required.
                          The default is 'Required', which means the reconcile will fail if the
                          reference cannot be resolved. 'Optional' means this reference will be
                          a no-op if it cannot be resolved.
                        enum:
                        - Required
                        - Optional
                        type: string
                      resolve:
                        description: |-
                          Resolve specifies when this reference should be resolved. The default
                          is 'IfNotPresent', which will attempt to resolve the reference only when
                          the corresponding field is not present. Use 'Always' to resolve the
                          reference on every reconcile.
                        enum:
                        - Always
                        - IfNotPresent
                        type: string
                    type: object
                required:
                - name
                type: object
              writeConnectionSecretToRef:
                description: |-
                  WriteConnectionSecretToReference specifies the namespace and name of a
                  Secret to which any connection details for this managed resource should
                  be written. Connection details frequently include the endpoint, username,
                  and password required to connect to the managed resource.
                properties:
                  name:
                    description: Name of the secret.
                    type: string
                  namespace:
                    description: Namespace of the secret.
                    type: string
                required:
                - name
                - namespace
                type: object
            required:
            - forProvider
            type: object
          status:
            description: ApplicationStatus represents the observed state of a GitLab
              instance OAuth Application.
            properties:
              atProvider:
                description: ApplicationObservation represents the observed state
                  of a GitLab instance OAuth Application.
                properties:
                  applicationID:
                    description: ApplicationID is the OAuth client ID.
                    type: string
                  callbackURL:
                    description: CallbackURL is the callback URL of the application
                      as stored in GitLab.
                    type: string
                  confidential:
                    description: Confidential indicates whether the application is
                      confidential.
                    type: boolean
                  id:
                    description: ID is the numeric ID of the application.
                    format: int64
                    type: integer
                  name:
                    description: Name is the name of the application as stored in
                      GitLab.
                    type: string
                  nextRenewalAt:
                    description: |-
                      NextRenewalAt is the next scheduled secret renewal time. It is managed by
                      the provider and used to determine when the OAuth client secret is due for
                      renewal. Read-only.
                    format: date-time
                    type: string
                  scopes:
                    description: Scopes is the scopes of the application as stored
                      in GitLab
                    items:
                      type: string
                    type: array
                type: object
              conditions:
                description: Conditions of the resource.
                items:
                  description: A Condition that may apply to a resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        LastTransitionTime is the last time this condition transitioned from one
                        status to another.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        A Message containing details about this condition's last transition from
                        one status to another, if any.
                      type: string
                    observedGeneration:
                      description: |-
                        ObservedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      type: integer
                    reason:
                      description: A Reason for this condition's last transition from
                        one status to another.
                      type: string
                    status:
                      description: Status of this condition; is it currently True,
                        False, or Unknown?
                      type: string
                    type:
                      description: |-
                        Type of this condition. At most one of each condition type may apply to
                        a resource at any point in time.
                      type: string
                  required:
                  - lastTransitionTime
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastHandledReconcileAt:
                description: |-
                  LastHandledReconcileAt holds the value of the most recent
                  reconcile-requested-at annotation token that the controller has
                  processed. Users can compare this to the annotation to determine
                  whether a reconcile request has been handled.
                type: string
              observedGeneration:
                description: |-
                  ObservedGeneration is the latest metadata.generation
                  which resulted in either a ready state, or stalled due to error
                  it can not recover from without human intervention.
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
