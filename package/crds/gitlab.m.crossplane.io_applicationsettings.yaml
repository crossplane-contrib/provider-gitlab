---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: applicationsettings.gitlab.m.crossplane.io
spec:
  group: gitlab.m.crossplane.io
  names:
    categories:
      - crossplane
      - provider
      - gitlab
    kind: ApplicationSettings
    listKind: ApplicationSettingList
    plural: applicationsettings
    singular: applicationsettings
  scope: Namespaced
  versions:
    - additionalPrinterColumns:
        - jsonPath: .metadata.creationTimestamp
          name: AGE
          type: date
        - jsonPath: .spec.credentials.secretRef.name
          name: SECRET-NAME
          priority: 1
          type: string
      name: v1beta1
      schema:
        openAPIV3Schema:
          description: An ApplicationSettings configures application-wide settings in GitLab.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: An ApplicationSettingsSpec defines the desired state of an ApplicationSettings.
            properties:
              forProvider:
                description: ApplicationSettingsParameters define the desired state of a GitLab Application Settings
                properties: &applicationSettingsParameters
                  abuseNotificationEmail:
                    description: If set, abuse reports are sent to this address. Abuse reports are always available in the Admin area.
                    type: string
                  afterSignOutPath:
                    description: Where to redirect users after logout.
                    type: string
                  afterSignUpText:
                    description: Text shown to the user after signing up.
                    type: string
                  adminMode:
                    description: Require administrators to enable Admin Mode by re-authenticating for administrative tasks.
                    type: boolean
                  adminNotificationEmail:
                    description: Deprecated: Use abuseNotificationEmail instead. If set, abuse reports are sent to this address. Abuse reports are always available in the Admin area.
                    type: string
                  akismetApiKey:
                    description: API key for Akismet spam protection. Required by akismetEnabled when Akismet is enabled.
                    type: string
                  akismetEnabled:
                    description: Enable or disable Akismet spam protection. If enabled, requires akismetApiKey.
                    type: boolean
                  allowAccountDeletion:
                    description: Set to true to allow users to delete their accounts. Premium and Ultimate only.
                    type: boolean
                  allowAllIntegrations:
                    description: When false, only integrations in allowedIntegrations are allowed on the instance. Ultimate only.
                    type: boolean
                  allowBypassPlaceholderConfirmation:
                    description: Skip confirmation when administrators reassign placeholder users.
                    type: boolean
                  allowGroupOwnersToManageLdap:
                    description: Allow group owners to manage LDAP. Premium and Ultimate only.
                    type: boolean
                  allowImmediateNamespacesDeletion:
                    description: Immediately delete groups and projects scheduled for deletion. Controlled by feature flag on GitLab 18.5 and later.
                    type: boolean
                  allowLocalRequestsFromHooksAndServices:
                    description: Deprecated: Use allowLocalRequestsFromWebHooksAndServices instead. Allow requests to the local network from webhooks and integrations.
                    type: boolean
                  allowLocalRequestsFromSystemHooks:
                    description: Allow requests to the local network from system hooks.
                    type: boolean
                  allowLocalRequestsFromWebHooksAndServices:
                    description: Allow requests to the local network from webhooks and integrations.
                    type: boolean
                  allowProjectCreationForGuestAndBelow:
                    description: Indicates whether users assigned up to the Guest role can create groups and personal projects. Defaults to true.
                    type: boolean
                  allowRunnerRegistrationToken:
                    description: Allow using a registration token to create a runner. Defaults to true.
                    type: boolean
                  archiveBuildsInHumanReadable:
                    description: Set the duration for which the jobs are considered old and expired. Examples: '15 days', '1 month', '2 years'.
                    type: string
                  assetProxyAllowlist:
                    description: Assets that match these domains are not proxied. Wildcards allowed. Your GitLab installation URL is automatically allowlisted.
                    type: array
                    items:
                      type: string
                  assetProxyEnabled:
                    description: Enable proxying of assets. If enabled, requires assetProxyUrl. GitLab restart required.
                    type: boolean
                  assetProxySecretKey:
                    description: Shared secret with the asset proxy server. GitLab restart is required.
                    type: string
                  assetProxyUrl:
                    description: URL of the asset proxy server. GitLab restart is required to apply changes.
                    type: string
                  assetProxyWhitelist:
                    description: Deprecated: Use assetProxyAllowlist instead. Addresses not proxied. Wildcards allowed.
                    type: array
                    items:
                      type: string
                  authorizedKeysEnabled:
                    description: By default, the authorized_keys file supports Git over SSH. Disable only with custom AuthorizedKeysCommand configuration.
                    type: boolean
                  autoBanUserOnExcessiveProjectsDownload:
                    description: Automatically ban users who download excessive unique projects in a specified time period. Self-Managed Ultimate only.
                    type: boolean
                  autoDevopsDomain:
                    description: Specify a domain to use by default for Auto Review Apps and Auto Deploy stages.
                    type: string
                  autoDevopsEnabled:
                    description: Enable Auto DevOps for projects by default.
                    type: boolean
                  autocompleteUsers:
                    description: Maximum number of authenticated requests per minute to GET /autocomplete/users.
                    type: integer
                  autocompleteUsersUnauthenticated:
                    description: Maximum number of unauthenticated requests per minute to GET /autocomplete/users.
                    type: integer
                  automaticPurchasedStorageAllocation:
                    description: Enables automatic allocation of purchased storage in a namespace. EE only.
                    type: boolean
                  asciidocMaxIncludes:
                    description: Maximum limit of AsciiDoc include directives processed in a document. Default: 32. Max: 64.
                    type: integer
                  assetProxyAllowlistRaw:
                    description: Raw newline- or comma-separated list of allowed asset proxy domains (deprecated in favor of allowlist array).
                    type: string
                  bulkImportConcurrentPipelineBatchLimit:
                    description: Maximum simultaneous direct transfer batch exports to process.
                    type: integer
                  bulkImportEnabled:
                    description: Enable migrating GitLab groups by direct transfer.
                    type: boolean
                  bulkImportMaxDownloadFileSize:
                    description: Maximum download file size when importing by direct transfer.
                    type: integer
                  canCreateGroup:
                    description: Indicates whether users can create top-level groups. Defaults to true.
                    type: boolean
                  checkNamespacePlan:
                    description: Make only licensed EE features available if namespace plan includes them or project is public. Premium and Ultimate only.
                    type: boolean
                  ciDeletePipelinesInSecondsLimitHumanReadable:
                    description: Maximum pipeline retention value allowed. Defaults to '1 year'.
                    type: string
                  ciJobLiveTraceEnabled:
                    description: Turn on incremental logging for job logs; archived logs incrementally uploaded to object storage.
                    type: boolean
                  ciMaxIncludes:
                    description: Maximum number of includes per pipeline. Default 150.
                    type: integer
                  ciMaxTotalYamlSizeBytes:
                    description: Maximum memory in bytes for pipeline configuration and includes.
                    type: integer
                  ciPartitionsSizeLimit:
                    description: Max disk space in bytes per CI database partition before creating new partitions.
                    type: integer
                  commitEmailHostname:
                    description: Custom hostname for private commit emails.
                    type: string
                  containerExpirationPoliciesEnableHistoricEntries:
                    description: Enable cleanup policies for all projects.
                    type: boolean
                  containerRegistryCleanupTagsServiceMaxListSize:
                    description: Max number of tags that can be deleted in a single cleanup execution.
                    type: integer
                  containerRegistryDeleteTagsServiceTimeout:
                    description: Max time in seconds cleanup can take to delete a batch of tags.
                    type: integer
                  containerRegistryExpirationPoliciesCaching:
                    description: Enable caching during the execution of container registry cleanup policies.
                    type: boolean
                  containerRegistryExpirationPoliciesWorkerCapacity:
                    description: Number of workers for container registry cleanup policies.
                    type: integer
                  containerRegistryTokenExpireDelay:
                    description: Container registry token duration in minutes.
                    type: integer
                  commitEmailHostnameRaw:
                    description: Custom hostname (deprecated variant). Use commitEmailHostname instead.
                    type: string
                  defaultArtifactsExpireIn:
                    description: Set the default expiration time for each job’s artifacts.
                    type: string
                  defaultBranchName:
                    description: Set the initial branch name for all projects in an instance.
                    type: string
                  defaultBranchProtection:
                    description: Deprecated in GitLab 17.0. Use defaultBranchProtectionDefaults instead.
                    type: integer
                  defaultBranchProtectionDefaults:
                    description: Default branch protection options (new in GitLab 17.0).
                    type: object
                  defaultCiConfigPath:
                    description: Default CI/CD configuration file and path for new projects.
                    type: string
                  defaultGroupVisibility:
                    description: Visibility level new groups receive. Can be 'private', 'internal' or 'public'. Default is 'private'.
                    type: string
                  deleteInactiveProjects:
                    description: Enable dormant project deletion. Default is false. Became operational without feature flag in GitLab 15.4.
                    type: boolean
                  defaultPreferredLanguage:
                    description: Default preferred language for users who are not logged in.
                    type: string
                  defaultProjectCreation:
                    description: Default minimum role required to create projects (0: No one, 1: Maintainers, 2: Developers, 3: Administrators, 4: Owners).
                    type: integer
                  defaultProjectDeletionProtection:
                    description: Enable default project deletion protection so only administrators can delete projects. Default false. Self-Managed Premium and Ultimate only.
                    type: boolean
                  defaultProjectVisibility:
                    description: Visibility level new projects receive. Can be 'private', 'internal' or 'public'. Default is 'private'.
                    type: string
                  defaultProjectsLimit:
                    description: Project limit per user. Default is 100000.
                    type: integer
                  defaultSnippetVisibility:
                    description: Visibility level new snippets receive. Default private.
                    type: string
                  defaultSyntaxHighlightingTheme:
                    description: Default syntax highlighting theme ID for users new or not signed in.
                    type: integer
                  defaultDarkSyntaxHighlightingTheme:
                    description: Default dark-mode syntax highlighting theme ID for users new or not signed in.
                    type: integer
                  deleteUnconfirmedUsers:
                    description: Whether to delete users who have not confirmed their email. When true they are deleted after unconfirmedUsersDeleteAfterDays days.
                    type: boolean
                  deletionAdjournedPeriod:
                    description: Days to wait before deleting a project or group that is marked for deletion.
                    type: integer
                    minimum: 1
                    maximum: 90
                    default: 30
                  diagramsnetEnabled:
                    description: Enable Diagrams.net integration. If enabled requires diagramsnetUrl. Default true.
                    type: boolean
                  diagramsnetUrl:
                    description: The Diagrams.net instance URL for integration.
                    type: string
                  diffMaxPatchBytes:
                    description: Maximum diff patch size, in bytes.
                    type: integer
                  diffMaxFiles:
                    description: Maximum files in a diff.
                    type: integer
                  diffMaxLines:
                    description: Maximum lines in a diff.
                    type: integer
                  disableAdminOauthScopes:
                    description: Stops administrators from connecting their accounts to non-trusted OAuth 2.0 applications with sensitive scopes.
                    type: boolean
                  disableFeedToken:
                    description: Disable display of RSS/Atom and calendar feed tokens.
                    type: boolean
                  disableInviteMembers:
                    description: Disable invite members functionality for group.
                    type: boolean
                  disableOverridingApproversPerMergeRequest:
                    description: Prevent editing approval rules in projects and merge requests.
                    type: boolean
                  disablePasswordAuthenticationForUsersWithSsoIdentities:
                    description: Disable password authentication in the web interface for users with an SSO identity.
                    type: boolean
                  disablePersonalAccessTokens:
                    description: Disable personal access tokens. No method to re-enable via API for tokens disabled by API. Self-Managed Premium and Ultimate only.
                    type: boolean
                  disabledOauthSignInSources:
                    description: Disabled OAuth sign-in sources.
                    type: array
                    items:
                      type: string
                  dnsRebindingProtectionEnabled:
                    description: Enforce DNS-rebinding attack protection.
                    type: boolean
                  domainAllowlist:
                    description: Force sign-up to corporate emails only. Default null.
                    type: array
                    items:
                      type: string
                  domainDenylist:
                    description: Users with emails matching these domains cannot sign up. Wildcards allowed.
                    type: array
                    items:
                      type: string
                  domainDenylistEnabled:
                    description: Allows blocking sign-ups from emails from specific domains. If enabled, requires domainDenylist.
                    type: boolean
                  downStreamPipelineTriggerLimitPerProjectUserSha:
                    description: Maximum downstream pipeline trigger rate per project/user/sha. 0 means no restriction.
                    type: integer
                  dsaKeyRestriction:
                    description: Minimum allowed bit length of a DSA key. Default 0 (no restriction). -1 disables DSA keys.
                    type: integer
                  ecdsaKeyRestriction:
                    description: Minimum allowed curve size (bits) for ECDSA key. Default 0. -1 to disable.
                    type: integer
                  ecdsaSkKeyRestriction:
                    description: Minimum allowed curve size for ECDSA_SK keys.
                    type: integer
                  ed25519KeyRestriction:
                    description: Minimum allowed curve size of ED25519 key in bits. Default 0. -1 disables.
                    type: integer
                  ed25519SkKeyRestriction:
                    description: Minimum allowed curve size for ED25519_SK keys.
                    type: integer
                  eksAccessKeyId:
                    description: AWS IAM access key ID for EKS integration.
                    type: string
                  eksAccountId:
                    description: AWS account ID for EKS integration.
                    type: string
                  eksIntegrationEnabled:
                    description: Enable integration with Amazon EKS.
                    type: boolean
                  eksSecretAccessKey:
                    description: AWS IAM secret key for EKS integration.
                    type: string
                  elasticsearchAws:
                    description: Enable the use of AWS hosted Elasticsearch. Premium and Ultimate only.
                    type: boolean
                  elasticsearchAwsAccessKey:
                    description: AWS IAM access key for Elasticsearch. Premium and Ultimate only.
                    type: string
                  elasticsearchAwsRegion:
                    description: AWS region of the Elasticsearch domain. Premium and Ultimate only.
                    type: string
                  elasticsearchAwsSecretAccessKey:
                    description: AWS IAM secret for Elasticsearch. Premium and Ultimate only.
                    type: string
                  elasticsearchClientAdapter:
                    description: The Faraday adapter used by the Elasticsearch Ruby client. Possible values: 'typhoeus' or 'net_http'. Premium and Ultimate only.
                    type: string
                  elasticsearchIndexedFieldLengthLimit:
                    description: Max size of text fields to index by Elasticsearch. 0 means no limit. Premium & Ultimate only.
                    type: integer
                  elasticsearchIndexedFileSizeLimitKb:
                    description: Max size in KB of repository and wiki files indexed by Elasticsearch. Premium & Ultimate only.
                    type: integer
                  elasticsearchIndexing:
                    description: Turn on indexing for advanced search. Premium and Ultimate only.
                    type: boolean
                  elasticsearchLimitIndexing:
                    description: Limit Elasticsearch to index certain namespaces and projects. Premium and Ultimate only.
                    type: boolean
                  elasticsearchMaxBulkConcurrency:
                    description: Max concurrency of Elasticsearch bulk requests per indexing operation. Only for repository indexing.
                    type: integer
                  elasticsearchMaxBulkSizeMb:
                    description: Max size of Elasticsearch bulk indexing requests in MB. Only for repository indexing.
                    type: integer
                  elasticsearchMaxCodeIndexingConcurrency:
                    description: Max concurrency of Elasticsearch code indexing background jobs. For repository indexing.
                    type: integer
                  elasticsearchNamespaceIds:
                    description: The namespaces to index via Elasticsearch when elasticsearchLimitIndexing is enabled. Premium & Ultimate only.
                    type: array
                    items:
                      type: integer
                  elasticsearchProjectIds:
                    description: The projects to index via Elasticsearch when elasticsearchLimitIndexing is enabled. Premium & Ultimate only.
                    type: array
                    items:
                      type: integer
                  elasticsearchPrefix:
                    description: Custom prefix for Elasticsearch index names. Defaults to 'gitlab'. Must be 1-100 chars, lowercase alphanumeric, hyphens, and underscores.
                    type: string
                  elasticsearchRetryOnFailure:
                    description: Maximum number of retries for Elasticsearch search requests.
                    type: integer
                  elasticsearchSearch:
                    description: Enable Elasticsearch search. Premium and Ultimate only.
                    type: boolean
                  elasticsearchUrl:
                    description: The URL to use for connecting to Elasticsearch. Use comma-separated list to support clusters.
                    type: string
                  elasticsearchUsername:
                    description: The username for the Elasticsearch instance. Premium and Ultimate only.
                    type: string
                  elasticsearchPassword:
                    description: The password for the Elasticsearch instance. Premium and Ultimate only.
                    type: string
                  emailAdditionalText:
                    description: Additional text added to the bottom of every email for legal/auditing/compliance reasons.
                    type: string
                  emailAuthorInBody:
                    description: Include the author name in the email body when email sender name cannot be overridden.
                    type: boolean
                  emailConfirmationSetting:
                    description: Specifies whether users must confirm their email before sign in. Possible values: 'off', 'soft', 'hard'.
                    type: string
                  emailRestrictions:
                    description: Regular expression that is checked against the email used during registration. Required by emailRestrictionsEnabled.
                    type: string
                  emailRestrictionsEnabled:
                    description: Enable restriction for sign-up by email.
                    type: boolean
                  enforceNamespaceStorageLimit:
                    description: Enables enforcement of namespace storage limits.
                    type: boolean
                  enforceTerms:
                    description: Enforce application ToS to all users. If enabled, requires terms.
                    type: boolean
                  enabledGitAccessProtocol:
                    description: Enabled protocols for Git access: 'ssh', 'http', or 'all'.
                    type: string
                  externalAuthClientCert:
                    description: Certificate to use to authenticate with external authorization service. If enabled requires externalAuthClientKey.
                    type: string
                  externalAuthClientKey:
                    description: Private key for the certificate when authentication is required for the external authorization service.
                    type: string
                  externalAuthClientKeyPass:
                    description: Passphrase for the private key used to authenticate with the external authorization service.
                    type: string
                  externalAuthorizationServiceDefaultLabel:
                    description: Default classification label used when requesting authorization and no label has been specified on the project.
                    type: string
                  externalAuthorizationServiceEnabled:
                    description: Enable using an external authorization service for accessing projects. If enabled requires default label, timeout and URL.
                    type: boolean
                  externalAuthorizationServiceTimeout:
                    description: Timeout in seconds after which an authorization request is aborted. Min 0.001, max 10.
                    type: number
                    format: float
                    minimum: 0.001
                    maximum: 10
                  externalAuthorizationServiceUrl:
                    description: URL to which authorization requests are directed.
                    type: string
                  externalPipelineValidationServiceTimeout:
                    description: How long to wait for a response from the pipeline validation service (seconds). Assumes OK on timeout.
                    type: integer
                  externalPipelineValidationServiceToken:
                    description: Token to include as the X-Gitlab-Token header in requests to the pipeline validation service URL.
                    type: string
                  externalPipelineValidationServiceUrl:
                    description: URL to use for pipeline validation requests.
                    type: string
                  failedLoginAttemptsUnlockPeriodInMinutes:
                    description: Time period in minutes for which a user is unlocked after reaching maximum failed sign-in attempts.
                    type: integer
                  fileTemplateProjectId:
                    description: ID of a project used to load custom file templates. Premium and Ultimate only.
                    type: integer
                  firstDayOfWeek:
                    description: Start day for calendars/date pickers. 0=Sunday, 1=Monday, 6=Saturday.
                    type: integer
                  gitRateLimitUsersAlertlist:
                    description: List of user IDs that are emailed when the Git abuse rate limit is exceeded.
                    type: array
                    items:
                      type: integer
                  gitRateLimitUsersAllowlist:
                    description: List of usernames excluded from Git anti-abuse rate limits.
                    type: array
                    items:
                      type: string
                  gitPushPipelineLimit:
                    description: Set the maximum number of tag or branch pipelines triggered by a single Git push.
                    type: integer
                  gitTwoFactorSessionExpiry:
                    description: Max session duration (minutes) for Git operations when 2FA is enabled.
                    type: integer
                  gitalyTimeoutDefault:
                    description: Default Gitaly timeout in seconds. Not enforced for certain operations. 0 disables.
                    type: integer
                  gitalyTimeoutFast:
                    description: Gitaly fast operation timeout in seconds. 0 disables.
                    type: integer
                  gitalyTimeoutMedium:
                    description: Medium Gitaly timeout in seconds.
                    type: integer
                  gitlabDedicatedInstance:
                    description: Indicates whether the instance was provisioned for GitLab Dedicated.
                    type: boolean
                  gitlabEnvironmentToolkitInstance:
                    description: Indicates whether the instance was provisioned with the GitLab Environment Toolkit for Service Ping reporting.
                    type: boolean
                  gitlabShellOperationLimit:
                    description: Maximum number of Git operations per minute per user. Default 600.
                    type: integer
                  grafanaEnabled:
                    description: Enable Grafana.
                    type: boolean
                  grafanaUrl:
                    description: Grafana URL.
                    type: string
                  geoNodeAllowedIps:
                    description: Comma-separated list of IPs and CIDRs of allowed secondary nodes. GitLab Self-Managed, Premium and Ultimate only.
                    type: string
                  geoStatusTimeout:
                    description: Amount of seconds after which a request to get a secondary node status times out. GitLab Self-Managed, Premium and Ultimate only.
                    type: integer
                  gravatarEnabled:
                    description: Enable Gravatar.
                    type: boolean
                  groupOwnersCanManageDefaultBranchProtection:
                    description: Prevent overrides of default branch protection. Self-Managed Premium and Ultimate only.
                    type: boolean
                  hashedStorageEnabled:
                    description: Create new projects using hashed storage paths. Always enabled in GitLab 13+. Scheduled for removal in 14.0.
                    type: boolean
                  helpPageDocumentaionBaseUrl:
                    description: Alternate documentation pages URL.
                    type: string
                  helpPageHideCommercialContent:
                    description: Hide marketing-related entries from help.
                    type: boolean
                  helpPageSupportUrl:
                    description: Alternate support URL for the help page and dropdown list.
                    type: string
                  helpPageText:
                    description: Custom text displayed on the help page.
                    type: string
                  hideThirdPartyOffers:
                    description: Do not display offers from third parties.
                    type: boolean
                  homePageUrl:
                    description: Redirect to this URL when not logged in.
                    type: string
                  housekeepingBitmapsEnabled:
                    description: Deprecated. Always returns true.
                    type: boolean
                  housekeepingEnabled:
                    description: Enable or disable Git housekeeping. Requires additional fields to be set.
                    type: boolean
                  housekeepingFullRepackPeriod:
                    description: Deprecated. Use housekeepingOptimizeRepositoryPeriod instead.
                    type: integer
                  housekeepingGcPeriod:
                    description: Deprecated. Use housekeepingOptimizeRepositoryPeriod instead.
                    type: integer
                  housekeepingIncrementalRepackPeriod:
                    description: Deprecated. Use housekeepingOptimizeRepositoryPeriod instead.
                    type: integer
                  housekeepingOptimizeRepositoryPeriod:
                    description: Number of Git pushes after which an incremental git repack is run.
                    type: integer
                  htmlEmailsEnabled:
                    description: Enable HTML emails.
                    type: boolean
                  iamRoleArnForEks:
                    description: IAM role ARN for EKS integrations (alternate naming in some contexts).
                    type: string
                  importSources:
                    description: Sources to allow project import from, possible values: github, bitbucket, bitbucket_server, fogbugz, git, gitlab_project, gitea, manifest.
                    type: array
                    items:
                      type: string
                  inactiveProjectsDeleteAfterMonths:
                    description: If delete_inactive_projects is true, the time (in months) to wait before deleting dormant projects. Default is 2. Became operational in GitLab 15.0.
                    type: integer
                  inactiveProjectsMinSizeMb:
                    description: If delete_inactive_projects is true, the minimum repository size for projects to be checked for inactivity. Default is 0. Became operational in GitLab 15.0.
                    type: integer
                  inactiveProjectsSendWarningEmailAfterMonths:
                    description: If delete_inactive_projects is true, sets the time (in months) to wait before emailing Maintainers that the project is scheduled be deleted because it is dormant. Default is 1. Became operational in GitLab 15.0.
                    type: integer
                  inactiveResourceAccessTokensDeleteAfterDays:
                    description: Retention period for inactive project and group access tokens (days). Default 30.
                    type: integer
                  inactiveResourceAccessTokensDeleteAfterDaysPerUser:
                    description: (Deprecated/unused) alias for inactiveResourceAccessTokensDeleteAfterDays.
                    type: integer
                  inactiveResourceAccessTokensRetention:
                    description: (Alternate deprecated naming) Use inactiveResourceAccessTokensDeleteAfterDays.
                    type: integer
                  issuesCreateLimit:
                    description: Max number of issue creation requests per minute per user.
                    type: integer
                  inactiveUserConfig:
                    description: Object describing automatic deactivation of dormant users when enabled.
                    type: object
                  jiraConnectApplicationKey:
                    description: ID of the OAuth application used to authenticate GitLab for Jira Cloud app.
                    type: string
                  jiraConnectPublicKeyStorageEnabled:
                    description: Enable public key storage for GitLab for Jira Cloud app.
                    type: boolean
                  jiraConnectProxyUrl:
                    description: URL of the GitLab instance used as a proxy for GitLab for Jira Cloud app.
                    type: string
                  kafkaBrokers:
                    description: Kafka brokers used for service integrations (internal naming example).
                    type: array
                    items:
                      type: string
                  keepLatestArtifact:
                    description: Prevent deletion of artifacts from the most recent successful jobs regardless of expiry time.
                    type: boolean
                  krokiEnabled:
                    description: Enable Kroki integration. Requires krokiUrl.
                    type: boolean
                  krokiUrl:
                    description: The Kroki instance URL for integration.
                    type: string
                  krokiFormats:
                    description: Additional formats supported by Kroki instance. Example: {bpmn: true, blockdiag: false}
                    type: object
                  lastLoginAttempt:
                    description: Internal last login attempt tracking (do not set manually) but included for completeness.
                    type: string
                  localMarkdownVersion:
                    description: Increase to invalidate cached Markdown.
                    type: integer
                  lockDuOFeaturesEnabled:
                    description: Lock the GitLab Duo features enabled setting for subgroups.
                    type: boolean
                  lockDuoFeaturesEnabled:
                    description: Lock whether GitLab Duo features are enabled at subgroup level.
                    type: boolean
                  lockMembersToSaml:
                    description: Enforce a global lock on SAML group memberships.
                    type: boolean
                  logRetentionPeriod:
                    description: Retention period for audit or logs (example field for some instances).
                    type: integer
                  mailgunEventsEnabled:
                    description: Enable Mailgun event receiver.
                    type: boolean
                  mailgunSigningKey:
                    description: The Mailgun HTTP webhook signing key for receiving events.
                    type: string
                  maintenanceMode:
                    description: When instance is in maintenance mode, non-administrative users have read-only access. Premium and Ultimate only.
                    type: boolean
                  maintenanceModeMessage:
                    description: Message displayed when the instance is in maintenance mode.
                    type: string
                  maxArtifactsSize:
                    description: Maximum artifacts size (MB).
                    type: integer
                  maxAttachmentSize:
                    description: Limit attachment size (MB).
                    type: integer
                  maxDecompressedArchiveSize:
                    description: Maximum decompressed file size for imported archives in MB. 0 for unlimited.
                    type: integer
                  maxExportSize:
                    description: Maximum export size (MB). 0 for unlimited.
                    type: integer
                  maxGithubResponseSizeLimit:
                    description: Maximum allowed GitHub API response size (MB). 0 for unlimited.
                    type: integer
                  maxGithubResponseJsonValueCount:
                    description: Max allowed value count for GitHub API responses. 0 for unlimited.
                    type: integer
                  maxHttpDecompressedSize:
                    description: Maximum allowed size in MiB for Gzip-compressed HTTP responses after decompression. 0 for unlimited.
                    type: integer
                  maxHttpResponseJsonDepth:
                    description: Max allowed JSON nesting depth for HTTP responses from outbound requests.
                    type: integer
                  maxHttpResponseJsonStructuralChars:
                    description: Max object count in JSON HTTP responses from outbound requests. Introduced in GitLab 18.4.
                    type: integer
                  maxHttpResponseSizeLimit:
                    description: Max allowed size in MiB for HTTP responses from outbound requests. 0 for unlimited.
                    type: integer
                  maxImportRemoteFileSize:
                    description: Maximum remote file size for imports from external object storages.
                    type: integer
                  maxImportSize:
                    description: Maximum import size in MB. 0 for unlimited.
                    type: integer
                  maxLoginAttempts:
                    description: Maximum number of sign-in attempts before locking out the user.
                    type: integer
                  maxPagesSize:
                    description: Maximum size of pages repositories in MB.
                    type: integer
                  maxPersonalAccessTokenLifetime:
                    description: Maximum lifetime for access tokens in days. 365 or less. GitLab Self-Managed Ultimate only.
                    type: integer
                  maxSshKeyLifetime:
